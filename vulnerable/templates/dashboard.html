<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskCore | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 min-h-screen">

    <!-- Header Navigation -->
    <nav class="bg-[#161b2c] border-b border-slate-800 px-6 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white shadow-lg">TC</div>
                <h1 class="text-lg font-bold text-white tracking-tight">TaskCore <span class="text-slate-500 font-normal">v2.4</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-xs text-slate-400">Authenticated User</p>
                    <p class="text-sm font-semibold text-white">{{ username }}</p>
                </div>
                <a href="/logout" class="bg-slate-800 hover:bg-red-900/30 text-slate-300 text-xs font-bold px-4 py-2 rounded-lg border border-slate-700 transition-all">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Sidebar: Task Entry -->
            <div class="lg:col-span-4">
                <div class="bg-[#161b2c] p-6 rounded-2xl border border-slate-800 shadow-xl sticky top-24">
                    <div class="flex items-center gap-2 mb-6">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        <h2 class="text-lg font-bold text-white">Create New Task</h2>
                    </div>
                    
                    <form method="POST" action="/create-task" class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Title</label>
                            <input name="title" required placeholder="Project milestone..." 
                                class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Detailed Description</label>
                            <textarea name="description" rows="4" placeholder="Briefly describe the requirements..." 
                                class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none transition-all"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all transform active:scale-95">
                            Commit Task
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Side: Search and List -->
            <div class="lg:col-span-8 space-y-6">
                
                <!-- Search Bar (Target for SQL Injection) -->
                <div class="bg-[#161b2c] p-4 rounded-2xl border border-slate-800">
                    <form action="/search" method="GET" class="relative group">
                        <input name="keyword" placeholder="Search task database..." value="{{ keyword if keyword }}"
                            class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-sm focus:ring-2 focus:ring-blue-600 outline-none transition-all placeholder-slate-600">
                        <svg class="w-5 h-5 absolute left-4 top-3 text-slate-500 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </form>
                </div>

                <!-- Results Section -->
                <div class="space-y-4">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest ml-1">Task Stream</h3>
                    
                    {% if tasks %}
                        {% for task in tasks %}
                        <div class="bg-[#161b2c] p-5 rounded-2xl border border-slate-800 hover:border-slate-600 transition-all group relative">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <h4 class="text-white font-bold text-lg group-hover:text-blue-400 transition-colors">{{ task.title }}</h4>
                                    <p class="text-slate-400 text-sm mt-2 leading-relaxed">{{ task.description }}</p>
                                    <div class="mt-4 flex items-center gap-3">
                                        <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-1 rounded border border-slate-700 font-mono tracking-tighter">REF: {{ task.id }}</span>
                                        <span class="text-[10px] bg-blue-900/20 text-blue-400 px-2 py-1 rounded border border-blue-900/30">Active</span>
                                    </div>
                                </div>
                                
                                <!-- IDOR Vulnerability Point (Direct Link) -->
                                <a href="/view-task/{{ task.id }}" class="text-slate-500 hover:text-white p-2" title="Inspect Task Object">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                </a>
                                <a href="/delete-task/{{ task.id }}"
   class="text-red-500 hover:text-red-300 text-xs font-bold ml-3">
   Delete
</a>
                            </div>
                        </div>
                        {% endfor %}
                    {% else %}
                        <div class="text-center py-24 bg-[#161b2c]/30 rounded-3xl border-2 border-dashed border-slate-800">
                            <p class="text-slate-500">No tasks found. Try adjusting your search query.</p>
                        </div>
                    {% endif %}
                </div>

            </div>
        </div>
    </main>

</body>
</html>
