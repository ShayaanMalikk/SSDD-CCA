<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskCore | System Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 min-h-screen flex flex-col">

    <!-- Simple Navigation -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight text-white">Task<span class="text-blue-500">Core</span></span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col lg:flex-row items-center justify-center px-6 gap-16 lg:gap-32">
        
        <!-- Left Side: Branding/Intro -->
        <div class="max-w-md hidden lg:block">
            <h1 class="text-5xl font-bold text-white leading-tight mb-6">
                Manage your <span class="text-blue-500 underline decoration-blue-900">projects</span> with confidence.
            </h1>
            <p class="text-slate-400 text-lg">
                TaskCore is an enterprise-grade task management system designed for high-performance teams. 
                Log in to access your secure workspace.
            </p>
        </div>

        <!-- Right Side: Forms -->
        <div class="w-full max-w-md space-y-8">
            
            <!-- Login Card -->
            <div class="bg-[#161b2c] p-8 rounded-3xl border border-slate-800 shadow-2xl">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-white">Sign In</h2>
                    <p class="text-slate-500 text-sm mt-1">Access your authorized account dashboard</p>
                </div>
                
                <form method="POST" action="/login" class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                        <input name="username" required 
                            class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all placeholder-slate-600"
                            placeholder="Enter username">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                        <input name="password" type="password" required 
                            class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all placeholder-slate-600"
                            placeholder="••••••••">
                    </div>
                    <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-900/30 transition-all transform active:scale-[0.98]">
                        Authorize Login
                    </button>
                </form>
            </div>

            <!-- Register Card (Minimalist) -->
            <div class="bg-[#161b2c]/50 p-8 rounded-3xl border border-slate-800/50 backdrop-blur-sm">
                <h3 class="text-lg font-semibold text-white mb-4">No account yet?</h3>
                <form method="POST" action="/register" class="flex flex-col sm:flex-row gap-3">
                    <input name="username" placeholder="Username" 
                        class="flex-1 bg-transparent border border-slate-700 rounded-xl px-4 py-2 text-sm focus:border-blue-500 outline-none transition-all">
                    <input name="password" type="password" placeholder="Password" 
                        class="flex-1 bg-transparent border border-slate-700 rounded-xl px-4 py-2 text-sm focus:border-blue-500 outline-none transition-all">
                    <button class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-semibold px-6 py-2 rounded-xl border border-slate-700 transition-all">
                        Register
                    </button>
                </form>
            </div>

        </div>
    </div>

    <!-- Footer Decoration -->
    <footer class="p-8 text-center">
        <p class="text-slate-600 text-xs tracking-widest uppercase">System Version 2.4.0-VULN</p>
    </footer>

</body>
</html>
